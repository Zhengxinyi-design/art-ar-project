<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AR Artwork Experience</title>
<style>
  body { margin:0; font-family: Arial, sans-serif; background:#0f0b08; color:#fff; }
  .wrap { min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px; box-sizing:border-box; }
  .card { width:min(960px,100%); background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.18); border-radius:24px; overflow:hidden; box-shadow:0 20px 70px rgba(0,0,0,.45); }
  img { width:100%; display:block; }
  .text { padding:18px 20px 22px; }
  h1 { margin:0 0 8px; font-size:22px; }
  p { margin:0; color:#ddd; line-height:1.6; font-size:15px; }
</style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <img src="result_artwork.png" alt="AR result artwork" />
      <div class="text">
        <h1>AR Artwork Experience</h1>
        <p>扫描二维码后进入此页面，展示由原作品延展出的第二张视觉画面。</p>
      </div>
    </section>
  </main>
</body>
</html>
